# AWS CLI SSO 프로필 설정
# 이 내용을 ~/.aws/config 파일에 추가하세요
#
# 플레이스홀더를 실제 값으로 교체:
#   {SSO_START_URL}  - IAM Identity Center의 AWS access portal URL
#   {SSO_ACCOUNT_ID} - Claude Code 전용 AWS 계정 ID
#   {SSO_ROLE_NAME}  - Permission Set 이름 (예: ClaudeCodeUser)

[profile claude-code]
sso_session = my-sso
sso_account_id = {SSO_ACCOUNT_ID}
sso_role_name = {SSO_ROLE_NAME}
region = us-east-1
output = json

[sso-session my-sso]
sso_start_url = {SSO_START_URL}
sso_region = us-east-1
sso_registration_scopes = sso:account:access
