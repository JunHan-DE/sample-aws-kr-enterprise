# =============================================================================
# AWS Distro for OpenTelemetry (ADOT) Collector Configuration
# =============================================================================
# Claude Code OpenTelemetry telemetry collection and routing.
#
# Pipeline layout:
#   - Metrics: OTLP -> memory_limiter -> batch -> prometheusremotewrite -> AMP
#   - Logs:    OTLP -> memory_limiter -> batch -> awscloudwatchlogs -> CW Logs
#
# IMPORTANT - Client temporality requirement:
#   The prometheusremotewrite exporter SILENTLY DROPS non-cumulative (delta)
#   metrics. Clients MUST use cumulative temporality:
#     - Do NOT set OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=delta
#     - Either omit it (default is cumulative) or set it explicitly to cumulative
#   See: https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/exporter/prometheusremotewriteexporter/README.md
# =============================================================================

# -----------------------------------------------------------------------------
# Extensions
# -----------------------------------------------------------------------------
extensions:
  # SigV4 authentication for AMP (Prometheus Remote Write)
  sigv4auth:
    region: ${AWS_REGION}
    service: aps

  # Health check endpoint used by NLB target group health checks
  health_check:
    endpoint: 0.0.0.0:13133

# -----------------------------------------------------------------------------
# Receivers
# -----------------------------------------------------------------------------
receivers:
  # OTLP receiver for Claude Code telemetry
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# -----------------------------------------------------------------------------
# Processors
# -----------------------------------------------------------------------------
processors:
  # Memory limiter - prevent OOM by applying backpressure
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Batch processor for metrics - optimize remote write efficiency
  batch/metrics:
    timeout: 60s
    send_batch_size: 1000
    send_batch_max_size: 1500

  # Batch processor for logs
  batch/logs:
    timeout: 10s
    send_batch_size: 500
    send_batch_max_size: 1000

# -----------------------------------------------------------------------------
# Exporters
# -----------------------------------------------------------------------------
exporters:
  # Prometheus Remote Write to AMP
  # NOTE: This exporter requires CUMULATIVE temporality.
  # Delta monotonic counters, histograms, and summaries are silently dropped.
  prometheusremotewrite:
    endpoint: ${AMP_REMOTE_WRITE_ENDPOINT}
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # CloudWatch Logs exporter for events
  # Downstream: CW Logs -> Subscription Filter -> Firehose -> S3 (Parquet)
  awscloudwatchlogs:
    log_group_name: ${CW_LOG_GROUP_NAME}
    log_stream_name: "claude-code-events"
    region: ${AWS_REGION}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  extensions:
    - sigv4auth
    - health_check

  pipelines:
    # Metrics pipeline: Claude Code metrics -> AMP
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch/metrics
      exporters:
        - prometheusremotewrite

    # Logs pipeline: Claude Code events -> CW Logs -> Firehose -> S3
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch/logs
      exporters:
        - awscloudwatchlogs

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
