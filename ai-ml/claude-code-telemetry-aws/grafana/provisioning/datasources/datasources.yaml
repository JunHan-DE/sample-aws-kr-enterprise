# Grafana data source provisioning configuration
# This file is for reference; actual data sources are configured
# via the DashboardStack CDK and Grafana API.
#
# Data source UIDs must match those referenced in dashboard JSON files:
#   - amp: Amazon Managed Prometheus
#   - athena: Amazon Athena

apiVersion: 1

datasources:
  - name: AMP
    uid: amp
    type: prometheus
    access: proxy
    url: "${AMP_QUERY_ENDPOINT}"
    jsonData:
      httpMethod: POST
      sigV4Auth: true
      sigV4Region: us-east-1

  - name: Athena
    uid: athena
    type: grafana-athena-datasource
    access: proxy
    jsonData:
      catalog: AwsDataCatalog
      database: claude_code_telemetry
      workgroup: primary
      region: us-east-1
