version: '3.8'

services:
  # Application service - Multi-architecture support (ARM64 and x86)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Multi-architecture build configuration
      platforms:
        - linux/amd64
        - linux/arm64
    image: graviton-demo:latest
    container_name: graviton-demo
    # Specify platform for deployment (uncomment for specific architecture)
    # platform: linux/arm64  # For AWS Graviton deployment
    # platform: linux/amd64  # For x86 deployment
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      # Note: JAVA_OPTS are defined in Dockerfile with Graviton optimizations
      # These include: -XX:-TieredCompilation, -XX:CICompilerCount=2, etc.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network
    # Resource limits (adjust based on instance size)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '1.0'
    #       memory: 1G

networks:
  app-network:
    driver: bridge

